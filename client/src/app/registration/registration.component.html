<div class="container mt-5">
  <div class="row justify-content-center">
    <div class="col-md-6">

      <div class="card shadow">
        <div class="card-header bg-primary text-white text-center">
          <h4>Registration</h4>
        </div>

        <div class="card-body">

          <div class="alert alert-danger" *ngIf="showMessage">
            {{ responseMessage }}
          </div>

          <form [formGroup]="itemForm" (ngSubmit)="onRegister()">

            <!-- Username -->
            <div class="mb-3">
              <label class="form-label">Username</label>
              <input type="text" class="form-control" formControlName="username" placeholder="Enter username" />

              <small class="text-danger"
                *ngIf="itemForm.get('username')?.touched && itemForm.get('username')?.hasError('required')">
                Username is required
              </small>
            </div>

            <!-- Email -->
            <div class="mb-3">
              <label class="form-label">Email</label>
              <input type="email" class="form-control" formControlName="email" placeholder="Enter email" />

              <small class="text-danger"
                *ngIf="itemForm.get('email')?.touched && itemForm.get('email')?.hasError('required')">
                Email is required
              </small>

              <small class="text-danger"
                *ngIf="itemForm.get('email')?.touched && itemForm.get('email')?.hasError('email')">
                Enter a valid email
              </small>
            </div>

            <!-- Password -->
            <div class="mb-3">
              <label class="form-label">Password</label>
              <input type="password" class="form-control" formControlName="password" placeholder="Enter password" />

              <small class="text-danger"
                *ngIf="itemForm.get('password')?.touched && itemForm.get('password')?.hasError('required')">
                Password is required
              </small>
            </div>

            <!-- Role -->
            <div class="mb-3">
              <label class="form-label">Role</label>
              <select class="form-select" formControlName="role">
                <option value="">Select Role</option>
                <option value="PATIENT">PATIENT</option>
                <option value="DOCTOR">DOCTOR</option>
                <option value="RECEPTIONIST">RECEPTIONIST</option>
              </select>

              <small class="text-danger"
                *ngIf="itemForm.get('role')?.touched && itemForm.get('role')?.hasError('required')">
                Role is required
              </small>
            </div>

            <!-- Doctor Specialty -->
            <div class="mb-3" *ngIf="itemForm.get('role')?.value === 'DOCTOR'">
              <label class="form-label">Specialty</label>
              <input type="text" class="form-control" formControlName="specialty" placeholder="Enter specialty" />

              <small class="text-danger"
                *ngIf="itemForm.get('specialty')?.touched && itemForm.get('specialty')?.hasError('required')">
                Specialty is required
              </small>
            </div>

            <!-- ✅ Doctor Availability -->
            <div class="mb-3" *ngIf="itemForm.get('role')?.value === 'DOCTOR'">
              <label class="form-label">Availability</label>
              <select class="form-select" formControlName="availability">
                <option value="">Select Availability</option>
                <option value="Yes">Yes</option>
                <option value="No">No</option>
              </select>

              <small class="text-danger"
                *ngIf="itemForm.get('availability')?.touched && itemForm.get('availability')?.hasError('required')">
                Availability is required
              </small>
            </div>

            <button type="submit" class="btn btn-primary w-100">
              Register
            </button>

          </form>

          <div class="text-center mt-3">
            <span>Already registered?</span>
            <a routerLink="/login">Login here</a>
          </div>

        </div>
      </div>

    </div>
  </div>
</div>
