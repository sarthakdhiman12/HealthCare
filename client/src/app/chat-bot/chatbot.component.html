<!-- ✅ FLOATING CHAT BUTTON — HOSPITAL STYLE -->
<div class="chat-fab" (click)="toggleChat()" [class.active]="isChatOpen">
  <div class="fab-inner">
    <i [class]="isChatOpen ? 'fas fa-times' : 'fas fa-headset'"></i>
  </div>
  <span class="fab-pulse" *ngIf="!isChatOpen"></span>
  <span class="fab-label" *ngIf="!isChatOpen">Need Help?</span>
</div>

<!-- ✅ CHAT WINDOW -->
<div class="chat-window" [class.open]="isChatOpen">

  <!-- Header -->
  <div class="chat-header">
    <div class="chat-header-left">
      <div class="bot-avatar">
        <i class="fas fa-user-nurse"></i>
        <span class="avatar-status"></span>
      </div>
      <div>
        <h5>HAM Health Assistant</h5>
        <span class="online-badge"><span class="dot"></span> Always here to help</span>
      </div>
    </div>
    <button class="close-btn" (click)="toggleChat()">
      <i class="fas fa-chevron-down"></i>
    </button>
  </div>

  <!-- Tabs -->
  <div class="chat-tabs">
    <button [class.active]="activeTab === 'chat'" (click)="switchTab('chat')">
      <i class="fas fa-comment-medical me-1"></i>Chat
    </button>
    <button [class.active]="activeTab === 'faq'" (click)="switchTab('faq')">
      <i class="fas fa-notes-medical me-1"></i>FAQ
    </button>
  </div>

  <!-- ✅ CHAT TAB -->
  <div class="chat-body" *ngIf="activeTab === 'chat'">
    <div class="messages-container">
      <div *ngFor="let msg of chatMessages"
           [class]="msg.sender === 'user' ? 'msg user-msg' : 'msg bot-msg'">
        <div class="msg-avatar" *ngIf="msg.sender === 'bot'">
          <i class="fas fa-user-nurse"></i>
        </div>
        <div class="msg-bubble">{{ msg.text }}</div>
      </div>
    </div>

    <!-- Quick Questions -->
    <div class="quick-questions">
      <span class="quick-label">Quick Actions:</span>
      <div class="quick-btns">
        <button (click)="userInput = 'How to book appointment?'; sendMessage()">
          <i class="fas fa-calendar-check me-1"></i>Book
        </button>
        <button (click)="userInput = 'What are consultation fees?'; sendMessage()">
          <i class="fas fa-rupee-sign me-1"></i>Fees
        </button>
        <button (click)="userInput = 'What specialties available?'; sendMessage()">
          <i class="fas fa-stethoscope me-1"></i>Specialties
        </button>
        <button (click)="userInput = 'Contact info'; sendMessage()">
          <i class="fas fa-phone-alt me-1"></i>Contact
        </button>
      </div>
    </div>

    <!-- Input -->
    <div class="chat-input">
      <input type="text"
             [(ngModel)]="userInput"
             (keypress)="onKeyPress($event)"
             placeholder="Ask about appointments, doctors..." />
      <button (click)="sendMessage()">
        <i class="fas fa-paper-plane"></i>
      </button>
    </div>
  </div>

  <!-- ✅ FAQ TAB -->
  <div class="faq-body" *ngIf="activeTab === 'faq'">
    <div class="faq-list">
      <div class="faq-item" *ngFor="let faq of faqs; let i = index"
           [class.open]="faq.open">
        <div class="faq-question" (click)="toggleFaq(i)">
          <span><i class="fas fa-heartbeat me-2 faq-icon"></i>{{ faq.question }}</span>
          <i [class]="faq.open ? 'fas fa-minus' : 'fas fa-plus'"></i>
        </div>
        <div class="faq-answer" *ngIf="faq.open">
          {{ faq.answer }}
        </div>
      </div>
    </div>
  </div>

</div>
